# Market Digest
title: Market Digest
description: Hourly trading hours news digest — Canadian market perspective with NYSE/TSX coverage and Polymarket odds
url: https://promkev.github.io/market-digest
baseurl: /market-digest
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter_opts:
    default_lang: plaintext
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
defaults:
  - scope:
      path: "archive"
      type: pages
    values:
      layout: default
include:
  - archive
exclude:
  - README.md
  - templates
