  analysis:
    theme: 'Central banks on both sides of the border are frozen — the BoC and Fed both held rates this week while watching the same two variables: Iran-driven oil and trade-policy uncertainty.'
    cad_angle: 'The loonie is caught in a tug-of-war: elevated oil supports through Canada''s net-exporter status, but CUSMA uncertainty and BoC''s dovish hold (projecting just 1.2% GDP growth) keep it
