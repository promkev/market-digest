<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Market Pulse — Market Digest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 2rem 1rem;
    }
    h2 { color: #c9d1d9; font-size: 1.2rem; font-weight: 600; margin-bottom: 1rem; }
    h2 span { color: #58a6ff; }
    canvas { display: block; border-radius: 8px; border: 1px solid #30363d; }
    .info {
      color: #8b949e;
      text-align: center;
      padding: 0.75rem;
      font-size: 0.8rem;
    }
    .info kbd {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 3px;
      padding: 0.1rem 0.4rem;
      font-size: 0.7rem;
      color: #c9d1d9;
    }
  </style>
</head>
<body>
  <h2><span>◆</span> Market Pulse</h2>
  <div class="info" style="padding-top:0; padding-bottom:0.5rem">
    <kbd>Click</kbd> shift mood &nbsp;·&nbsp;
    <kbd>S</kbd> save PNG &nbsp;·&nbsp;
    <kbd>R</kbd> reseed
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
  <script>
  p5.disableFriendlyErrors = true;

  // ── Sectors ──
  const SECTORS = [
    { name:'Technology',     r:88,  g:166, b:255, count:140, speed:0.7 },
    { name:'Energy',         r:63,  g:185, b:80,  count:110, speed:0.9 },
    { name:'Oil & Gas',      r:240, g:180, b:60,  count:85,  speed:0.6 },
    { name:'Interest Rates', r:255, g:85,  b:70,  count:75,  speed:0.45},
    { name:'Geopolitics',    r:170, g:120, b:255, count:65,  speed:0.35},
    { name:'Canada',         r:220, g:220, b:230, count:40,  speed:0.8 },
  ];

  let particles = [];
  let flowField;
  let mood = 0.5;
  let moodTarget = 0.5;
  let tick = 0;
  let seed = 42;

  function setup() {
    let w = min(windowWidth - 32, 900);
    let h = w * 0.5;
    createCanvas(w, h);
    pixelDensity(1);
    colorMode(RGB, 255);
    randomSeed(seed);
    noiseSeed(seed);

    flowField = makeFlowField();

    // Create particles distributed across the whole canvas
    for (let s of SECTORS) {
      for (let i = 0; i < s.count; i++) {
        let p = {
          sector: s,
          x: random(width),
          y: random(height),
          vx: 0, vy: 0,
          size: random(2.5, 5.5),
          age: 0,
          maxAge: int(random(300, 700)),
        };
        particles.push(p);
      }
    }
  }

  function makeFlowField() {
    let cols = floor(width / 15) + 2;
    let rows = floor(height / 15) + 2;
    let ff = [];
    for (let y = 0; y < rows; y++) {
      for (let x = 0; x < cols; x++) {
        let a = noise(x * 0.08, y * 0.08, tick * 0.002) * TWO_PI * 3;
        ff.push({ x: cos(a), y: sin(a) });
      }
    }
    ff.cols = cols;
    ff.rows = rows;
    return ff;
  }

  function flowLookup(x, y) {
    let col = floor(x / 15);
    let row = floor(y / 15);
    col = constrain(col, 0, flowField.cols - 1);
    row = constrain(row, 0, flowField.rows - 1);
    return flowField[col + row * flowField.cols];
  }

  function draw() {
    tick++;
    background(13, 17, 23);

    // Slow mood drift
    if (random() < 0.004) moodTarget = constrain(mood + random(-0.15, 0.15), 0.08, 0.92);
    mood = lerp(mood, moodTarget, 0.01);

    // Rebuild flow field every ~30 frames
    if (tick % 30 === 0) flowField = makeFlowField();

    // Grid lines
    stroke(48, 54, 61, 30);
    strokeWeight(0.5);
    for (let x = 0; x < width; x += 60) line(x, 0, x, height);
    for (let y = 0; y < height; y += 60) line(0, y, width, y);

    // Draw particles
    noStroke();
    for (let p of particles) {
      let f = flowLookup(p.x, p.y);
      let spd = p.sector.speed * lerp(0.65, 1.35, mood);
      p.vx += f.x * 0.18 * spd;
      p.vy += f.y * 0.18 * spd;
      p.vx *= 0.92;
      p.vy *= 0.92;
      p.x += p.vx;
      p.y += p.vy;
      p.age++;

      // Wrap
      if (p.x < -60) p.x = width + 60;
      if (p.x > width + 60) p.x = -60;
      if (p.y < -60) p.y = height + 60;
      if (p.y > height + 60) p.y = -60;

      // Reset old particles
      if (p.age > p.maxAge) {
        p.x = random(width);
        p.y = random(height);
        p.vx = 0;
        p.vy = 0;
        p.age = 0;
        p.maxAge = int(random(300, 700));
      }

      let bright = lerp(0.9, 1.0, mood);
      let r = int(p.sector.r * bright);
      let g = int(p.sector.g * bright);
      let b = int(p.sector.b * bright);

      // GLOW: large soft circle behind each particle
      fill(r, g, b, 100);
      ellipse(p.x, p.y, p.size * 7);

      // Medium ring
      fill(r, g, b, 200);
      ellipse(p.x, p.y, p.size * 3);

      // Bright core
      fill(255, 255, 255, 230);
      ellipse(p.x, p.y, p.size * 0.8);
    }

    // ── Vignette ──
    noFill();
    let cx = width / 2, cy = height / 2;
    let maxR = dist(0, 0, cx, cy) * 1.1;
    for (let r = maxR; r > maxR * 0.2; r -= 7) {
      let a = map(r, maxR * 0.2, maxR, 0, 60);
      stroke(13, 17, 23, a);
      strokeWeight(r * 0.35);
      ellipse(cx, cy, r * 2);
    }

    // ── HUD overlays ──
    // Mood bar (top-right)
    noStroke();
    let bx = width - 155, by = 15;
    fill(255, 110);
    textAlign(LEFT, TOP);
    textSize(11);
    text('MARKET MOOD', bx, by);

    let bw = 120, bh = 5;
    fill(48, 54, 61, 160);
    rect(bx, by + 15, bw, bh, 3);

    // Red → green gradient
    let m = mood;
    let mr, mg, mb;
    if (m < 0.5) { // red → yellow
      let t = m / 0.5;
      mr = lerp(248, 240, t);
      mg = lerp(81, 180, t);
      mb = lerp(73, 60, t);
    } else { // yellow → green
      let t = (m - 0.5) / 0.5;
      mr = lerp(240, 63, t);
      mg = lerp(180, 185, t);
      mb = lerp(60, 80, t);
    }
    fill(int(mr), int(mg), int(mb), 200);
    rect(bx, by + 15, bw * m, bh, 3);

    let label = m < 0.35 ? 'BEARISH 📉' : m > 0.65 ? 'BULLISH 📈' : 'NEUTRAL';
    fill(139, 148, 158);
    textSize(9);
    text(label, bx + bw + 8, by);

    // Sector legend (bottom)
    let ly = height - 22;
    let lx = 16;
    for (let s of SECTORS) {
      fill(s.r, s.g, s.b, 200);
      noStroke();
      circle(lx + 4, ly + 5, 6);
      fill(200, 210);
      textSize(10);
      textAlign(LEFT, CENTER);
      text(s.name, lx + 11, ly + 5);
      lx += textWidth(s.name) + 24;
    }
  }

  function mousePressed() {
    moodTarget = random();
    mood = lerp(mood, moodTarget, 0.4);
  }

  function keyPressed() {
    if (key === 's' || key === 'S') saveCanvas('market-pulse', 'png');
    if (key === 'r' || key === 'R') {
      seed = floor(random(99999));
      randomSeed(seed);
      noiseSeed(seed);
    }
  }

  function windowResized() {
    let w = min(windowWidth - 32, 900);
    let h = w * 0.5;
    resizeCanvas(w, h);
    flowField = makeFlowField();
  }
  </script>
</body>
</html>
