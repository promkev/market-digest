<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scenario Trees — Market Digest</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; }
    #container { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem; }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 0.25rem; }
    h1 span { color: #58a6ff; }
    .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 1.25rem; }
    .tree-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tree-btn {
      background: #161b22; border: 1px solid #30363d; color: #c9d1d9;
      padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer;
      font-size: 0.85rem; transition: all 0.15s;
    }
    .tree-btn:hover { border-color: #58a6ff; background: #1c2333; }
    .tree-btn.active { border-color: #58a6ff; background: #1c2333; color: #58a6ff; font-weight: 600; }
    #canvas-wrapper {
      width: 100%; aspect-ratio: 16/10;
      border: 1px solid #30363d; border-radius: 8px; overflow: hidden;
      background: #0d1117; position: relative;
    }
    #canvas-wrapper canvas { display: block !important; width: 100% !important; height: 100% !important; }
    #tree-info {
      margin-top: 0.75rem; padding: 0.75rem 1rem;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; min-height: 3rem;
      font-size: 0.85rem; line-height: 1.5;
    }
    #tree-info .empty { color: #8b949e; font-style: italic; }
    #tree-info .title { color: #58a6ff; font-weight: 600; font-size: 0.95rem; }
    #tree-info .prob { font-weight: 600; font-size: 1.1rem; }
    #tree-info .impact { color: #8b949e; font-size: 0.8rem; margin-top: 0.25rem; }
    #tree-info .tag { display: inline-block; background: rgba(88,166,255,0.15); color: #58a6ff; padding: 0.1rem 0.4rem; border-radius: 3px; font-size: 0.7rem; }
    #tree-info .delta-up { color: #3fb950; }
    #tree-info .delta-down { color: #f85149; }
    .controls { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.5rem; }
    .controls kbd { background: #161b22; border: 1px solid #30363d; border-radius: 3px; padding: 0.1rem 0.4rem; font-size: 0.7rem; color: #8b949e; }
    .polymarket-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #a371f7; margin-right: 4px; vertical-align: middle; }
  </style>
</head>
<body>
<div id="container">
  <h1><span>◆</span> Scenario Trees</h1>
  <div class="subtitle">Interactive forecast trees with Polymarket-anchored probabilities</div>

  <div class="tree-tabs" id="tree-tabs"></div>

  <div id="canvas-wrapper"></div>

  <div id="tree-info">
    <div class="empty">Hover a scenario node to see details, or click to lock selection</div>
  </div>

  <div class="controls">
    <span><kbd>Drag</kbd> nodes</span>
    <span><kbd>Hover</kbd> info</span>
    <span><kbd>Click</kbd> lock</span>
    <span>🟣 = Polymarket-linked</span>
    <span>Sized by probability</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.11.3/p5.min.js"></script>
<script>
p5.disableFriendlyErrors = true;

// ─────────────────────────────────────────────────────
// DATA — inline from scenario-tree config.json
// ─────────────────────────────────────────────────────
const TREE_DATA = {

        ]},

        children:[

            impact:{ oil:"WTI $150+", cad:"CAD -3%", tsx_energy:"TSX Energy +8%", desc:"Physical blockage or naval conflict" } },
          { id:"limited-strikes", label:"Limited strike campaign", prob:0.6, condition_on:"escalation",
            impact:{ oil:"WTI ~$120-130", cad:"CAD -1%", tsx_energy:"TSX Energy +3%", desc:"Air/naval strikes without ground invasion" } }
        ]}
    ]
  },
  "boc-rates": {
    label: "🏦 Bank of Canada Rates",
    desc: "Probability and impact of BoC rate decisions through 2026",
    nodes: [
      { id:"boc-hold", label:"BoC holds at 2.25% through 2026", prob:0.37, type:"outcome",
        impact:{ cad:"CAD stable to weaker", tsx_financials:"Bank margins compressed", bonds:"Yields drift lower", housing:"Rate-sensitive sectors stabilize",
                 desc:"BoC stays on hold — April 29 decision confirmed this direction" } },
      { id:"boc-hike", label:"BoC hikes rates in 2026", prob:0.63, type:"outcome",
        polymarket:"bank-of-canada-rate-hike-in-2026", volume:6499,
        impact:{ cad:"CAD strengthens 1-2%", tsx_financials:"Bank margins expand", bonds:"Yields push higher", housing:"Further cooling",
                 desc:"At least one 25bp hike from current 2.25%" },
        children:[
          { id:"one-hike", label:"One 25bp hike (to 2.50%)", prob:0.65, condition_on:"boc-hike",
            impact:{ cad:"CAD +0.5%", desc:"June meeting most likely — single hike then pause" } },
          { id:"multiple-hikes", label:"Two or more hikes", prob:0.35, condition_on:"boc-hike",
            impact:{ cad:"CAD +2%", bonds:"Yields spike 50bp+", desc:"Inflation surprise or CAD defense forces aggressive tightening" } }
        ]}
    ]
  },
  "fed-rates": {
    label: "🏛️ Federal Reserve Rates",
    desc: "Fed rate cut probability and US monetary policy direction",
    nodes: [
      { id:"fed-no-cuts", label:"Zero rate cuts in 2026", prob:0.572, type:"outcome",
        polymarket:"will-no-fed-rate-cuts-happen-in-2026", volume:3756944.7,
        impact:{ equities:"S&P 500 range-bound", cad:"CAD under pressure (rate divergence)", bonds:"Yield curve stays inverted",
                 desc:"Fed holds at 4.25-4.50% with inflation sticky above 3%" } },
      { id:"fed-one-cut", label:"One rate cut in 2026", prob:0.175, type:"outcome",
        polymarket:"will-1-fed-rate-cut-happen-in-2026", volume:1129898.5,
        impact:{ equities:"Modest equity rally, growth stocks benefit", cad:"CAD strengthens slightly", bonds:"Yield curve steepens",
                 desc:"Late-year cut if inflation cools to ~2.5%" } },
      { id:"fed-two-plus-cuts", label:"Two or more rate cuts", prob:0.125, type:"outcome",
        polymarket:"will-2-fed-rate-cuts-happen-in-2026", volume:1100438.2,
        impact:{ equities:"Strong equity rally, risk-on", cad:"CAD +1.5%+", bonds:"Yield curve normalizes",
                 desc:"Requires recession or sharp inflation drop" } }
    ]
  },
  "trade-tariffs": {
    label: "🌐 US-Canada Trade & Tariffs",
    desc: "Trade deal probability and tariff risk for Canadian economy",
    nodes: [
      { id:"no-trade-deal", label:"No new US-Canada trade deal", prob:0.64, type:"outcome",
        impact:{ cad:"CAD under pressure", tsx:"Exporters face uncertainty", manufacturing:"Investment delayed",
                 desc:"Status quo — ongoing tariff friction, no formal agreement" },
        children:[
          { id:"tariffs-escalate", label:"Tariffs increase / trade war", prob:0.3, condition_on:"no-deal",
            impact:{ cad:"CAD -3%", tsx:"Broad sell-off", desc:"New tariffs imposed, retaliatory measures" } },
          { id:"muddling-through", label:"Muddling through — no major change", prob:0.7, condition_on:"no-deal",
            impact:{ cad:"CAD flat", tsx:"Sector rotation", desc:"Periodic threats but no new major tariffs" } }
        ]},
      { id:"trade-deal-reached", label:"New US-Canada trade deal", prob:0.415, type:"outcome",
        polymarket:"us-agrees-to-a-new-trade-deal-with-canada-before-2027", volume:2406.3,
        impact:{ cad:"CAD +1-2%", tsx:"Broad rally, exporters lead", manufacturing:"Investment resumes",
                 desc:"Comprehensive or limited trade deal removes uncertainty" } }
    ]
  },
  "recession-risk": {
    label: "📉 Recession Risk",
    desc: "Probability of recession in US and Canada",
    nodes: [
      { id:"us-recession", label:"US recession by end of 2026", prob:0.215, type:"outcome",
        polymarket:"us-recession-by-end-of-2026", volume:1416054.5,
        impact:{ equities:"S&P 500 -15-20%", cad:"CAD weakens (flight to USD)", bonds:"Yields collapse",
                 oil:"WTI demand destruction", desc:"US enters recession — major risk-off event" } },
      { id:"canada-recession", label:"Canada recession before 2027", prob:0.195, type:"outcome",
        polymarket:"canada-recession-before-2027", volume:65455.9,
        impact:{ tsx:"TSX -10-15%", cad:"CAD -2-3%", bonds:"BoC forced to cut", housing:"Correction accelerates",
                 desc:"Canada-specific recession, possibly triggered by trade/tariff shock" } }
    ]
  },
  "oil-price": {
    label: "🛢️ Oil Price Scenarios",
    desc: "WTI crude price scenarios driven by Iran + OPEC + demand",
    nodes: [
      { id:"oil-100-120", label:"WTI $100-120 (base case)", prob:0.5, type:"outcome",
        impact:{ tsx_energy:"Energy sector steady", cad:"CAD supported", inflation:"Transportation costs elevated",
                 desc:"Iran situation contained, demand steady" } },
      { id:"oil-120-140", label:"WTI $120-140 (upside)", prob:0.3, type:"outcome",
        impact:{ tsx_energy:"Energy sector +3-5%", cad:"CAD +1%", inflation:"Significant inflation pressure",
                 desc:"Iran escalation or supply disruption" } },
      { id:"oil-140-plus", label:"WTI $140-150+ (tail risk)", prob:0.15, type:"outcome",
        impact:{ tsx_energy:"Energy sector +8-10%", cad:"CAD +2% then risk-off", inflation:"Demand destruction risk",
                 desc:"Major supply shock — Strait of Hormuz or regional war" } },
      { id:"oil-below-100", label:"WTI below $100 (downside)", prob:0.05, type:"outcome",
        impact:{ tsx_energy:"Energy sector -5%", cad:"CAD -1%", inflation:"Eases significantly",
                 desc:"De-escalation + demand weakness + OPEC increase" } }
    ]
  }
};

// ─────────────────────────────────────────────────────
// GLOBALS
// ─────────────────────────────────────────────────────
let currentTree = "iran-conflict";
let graphNodes = [];
let graphEdges = [];
let draggedNode = null;
let hoverNode = null;
let clickedNode = null;
let tick = 0;

// Tree tab buttons
const treeTabs = document.getElementById("tree-tabs");
for (let [key, tree] of Object.entries(TREE_DATA)) {
  let btn = document.createElement("button");
  btn.className = "tree-btn" + (key === currentTree ? " active" : "");
  btn.textContent = tree.label;
  btn.onclick = () => switchTree(key);
  treeTabs.appendChild(btn);
}

function switchTree(key) {
  currentTree = key;
  document.querySelectorAll(".tree-btn").forEach((b, i) => {
    b.className = "tree-btn" + (Object.keys(TREE_DATA)[i] === key ? " active" : "");
  });
  clickedNode = null;
  hoverNode = null;
  rebuildGraph();
}

// ─────────────────────────────────────────────────────
// GRAPH BUILDER
// ─────────────────────────────────────────────────────
function rebuildGraph() {
  let tree = TREE_DATA[currentTree];
  if (!tree) return;

  graphNodes = [];
  graphEdges = [];

  // Physical constants
  let cx = width / 2, cy = height / 2;
  let radius = min(width, height) * 0.28;
  let rootY = height * 0.15;

  function addNode(n, parentNode, depth, index, siblings) {
    let isPM = !!n.polymarket;
    let maxProb = 0;
    for (let nd of tree.nodes) if (nd.prob > maxProb) maxProb = nd.prob;

    let node = {
      id: n.id,
      label: n.label,
      prob: n.prob,
      rawProb: n.prob,
      isPM: isPM,
      hasChildren: n.children && n.children.length > 0,
      data: n,
      // Position: root at top, children spread below
      x: cx + (index - (siblings - 1) / 2) * (width / (siblings + 1)) * 0.35,
      y: rootY + depth * (height * 0.22),
      vx: 0, vy: 0,
      radius: map(n.prob, 0.02, maxProb + 0.02, 15, 48),
    };

    graphNodes.push(node);

    if (parentNode) {
      graphEdges.push({ from: parentNode, to: node });
    }

    if (n.children) {
      for (let ci = 0; ci < n.children.length; ci++) {
        addNode(n.children[ci], node, depth + 1, ci, n.children.length);
      }
    }
  }

  // Add root-level nodes
  for (let ni = 0; ni < tree.nodes.length; ni++) {
    addNode(tree.nodes[ni], null, 0, ni, tree.nodes.length);
  }
}

// ─────────────────────────────────────────────────────
// p5
// ─────────────────────────────────────────────────────
function setup() {
  let wrap = select("#canvas-wrapper");
  let w = min(wrap.width, 1000);
  let h = w * 0.625;
  createCanvas(w, h).parent("canvas-wrapper");
  pixelDensity(1);
  colorMode(RGB, 255);
  rebuildGraph();
}

function draw() {
  tick++;
  background(13, 17, 23);

  // Physics — simple spring+repulsion
  let repStrength = 400;

  for (let i = 0; i < graphNodes.length; i++) {
    let a = graphNodes[i];

    // Repel from other nodes
    for (let j = i + 1; j < graphNodes.length; j++) {
      let b = graphNodes[j];
      let dx = a.x - b.x;
      let dy = a.y - b.y;
      let dist = max(sqrt(dx * dx + dy * dy), 1);
      let force = repStrength / (dist * dist);
      let fx = (dx / dist) * force;
      let fy = (dy / dist) * force;
      a.vx += fx;
      a.vy += fy;
      b.vx -= fx;
      b.vy -= fy;
    }

    // Spring toward target position
    let targetX = a.targetX || a.x;
    let targetY = a.targetY || a.y;
    let dxT = targetX - a.x;
    let dyT = targetY - a.y;
    a.vx += dxT * 0.01;
    a.vy += dyT * 0.01;

    // Damping
    a.vx *= 0.9;
    a.vy *= 0.9;
    a.x += a.vx;
    a.y += a.vy;

    // Clamp
    a.x = constrain(a.x, 20, width - 20);
    a.y = constrain(a.y, 20, height - 20);
  }

  // ── DRAW ──
  // Subtle grid
  stroke(48, 54, 61, 25);
  strokeWeight(0.5);
  for (let x = 0; x < width; x += 50) line(x, 0, x, height);
  for (let y = 0; y < height; y += 50) line(0, y, width, y);

  // Edges
  noFill();
  for (let e of graphEdges) {
    let a = e.from, b = e.to;
    let isActive = (!clickedNode || a === clickedNode || b === clickedNode);
    stroke(48, 54, 61, isActive ? 100 : 20);
    strokeWeight(isActive ? 1.2 : 0.5);
    line(a.x, a.y, b.x, b.y);
  }

  // Nodes
  noStroke();
  for (let n of graphNodes) {
    let isHover = (n === hoverNode);
    let isClick = (n === clickedNode);
    let isSelected = isHover || isClick;
    let fade = (!clickedNode || isClick || isHover || n.data.polymarket) ? 1 : 0.4;
    if (!clickedNode) fade = 1;

    let r = n.radius * (isSelected ? 1.25 : 1);
    let baseAlpha = 200 * fade;
    let fillAlpha = 180 * fade;

    // Background glow
    fill(88, 166, 255, 25 * fade);
    ellipse(n.x, n.y, r * 3);

    // If Polymarket-linked: purple ring, otherwise blue
    if (n.isPM) {
      fill(163, 113, 247, baseAlpha);
      ellipse(n.x, n.y, r * 2);
      fill(13, 17, 23, 200 * fade);
      ellipse(n.x, n.y, r * 1.6);
      fill(163, 113, 247, fillAlpha);
      ellipse(n.x, n.y, r * 1.3);
    } else {
      fill(48, 54, 61, baseAlpha);
      ellipse(n.x, n.y, r * 2);
      fill(13, 17, 23, 200 * fade);
      ellipse(n.x, n.y, r * 1.6);
    }

    // Core circle — probability brightness
    let bright = map(n.prob, 0, 0.7, 60, 200);
    if (n.isPM) {
      fill(163, 113, 247, min(bright * fade, 230));
    } else {
      fill(88, 166, 255, min(bright * fade, 230));
    }
    ellipse(n.x, n.y, r);

    // Label
    textAlign(CENTER, CENTER);
    textSize(isSelected ? 9 : 8);
    textStyle(isSelected ? BOLD : NORMAL);

    // Probability %
    fill(255, isSelected ? 230 : 170 * fade);
    text(int(n.prob * 100) + "%", n.x, n.y - 2);

    // Label below
    fill(255, isSelected ? 180 : 110 * fade);
    textSize(isSelected ? 7 : 6.5);
    let labelY = n.y + r * 0.9 + 8;
    text(n.label, n.x, labelY);

    // Polymarket badge
    if (n.isPM) {
      noFill();
      stroke(163, 113, 247, 120 * fade);
      strokeWeight(0.8);
      ellipse(n.x, n.y, r * 2.4);
    }
  }
}

// ── Info panel ──
function updateInfo(n) {
  let panel = document.getElementById("tree-info");
  if (!n) {
    panel.innerHTML = '<div class="empty">Hover a scenario node to see details, or click to lock selection</div>';
    return;
  }

  let d = n.data;
  let impactHtml = "";
  if (d.impact) {
    let items = [];
    for (let [k, v] of Object.entries(d.impact)) {
      if (k === "desc") continue;
      let label = k.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
      items.push(`<strong>${label}:</strong> ${v}`);
    }
    if (items.length) impactHtml = '<div class="impact">' + items.join("<br>") + "</div>";
    if (d.impact.desc) {
      impactHtml += '<div style="color:#8b949e;font-size:0.8rem;margin-top:0.3rem;font-style:italic">' + d.impact.desc + "</div>";
    }
  }

  let polyBadge = d.polymarket
    ? `<div style="margin-top:0.3rem"><span class="polymarket-dot"></span><a href="https://polymarket.com/event/${d.polymarket}" target="_blank" style="color:#a371f7;font-size:0.8rem">${d.polymarket}</a> <span style="color:#8b949e;font-size:0.75rem">· $${(d.volume || 0).toLocaleString()} vol</span></div>`
    : "";

  let probColor = n.prob > 0.5 ? "#3fb950" : n.prob > 0.25 ? "#d29932" : "#f85149";

  panel.innerHTML = `
    <div class="title">${n.label}</div>
    <div>Probability: <span class="prob" style="color:${probColor}">${(n.prob * 100).toFixed(1)}%</span></div>
    ${impactHtml}
    ${polyBadge}
  `;
}

// ── Mouse ──
function mouseMoved() {
  let found = null;
  let minDist = 30;
  for (let n of graphNodes) {
    let d = dist(mouseX, mouseY, n.x, n.y);
    if (d < n.radius + 20 && d < minDist) {
      minDist = d;
      found = n;
    }
  }
  if (found !== hoverNode) {
    hoverNode = found;
    if (!clickedNode) updateInfo(found);
  }
}

function mousePressed() {
  let found = null;
  let minDist = 30;
  for (let n of graphNodes) {
    let d = dist(mouseX, mouseY, n.x, n.y);
    if (d < n.radius + 20 && d < minDist) {
      minDist = d;
      found = n;
    }
  }
  if (found) {
    if (clickedNode === found) {
      clickedNode = null;
      updateInfo(hoverNode);
    } else {
      clickedNode = found;
      updateInfo(found);
    }
  } else {
    clickedNode = null;
    updateInfo(hoverNode);
  }
}

function windowResized() {
  let wrap = select("#canvas-wrapper");
  let w = min(wrap.width, 1000);
  let h = w * 0.625;
  resizeCanvas(w, h);
  rebuildGraph();
}

function keyPressed() {
  if (key === "s" || key === "S") saveCanvas("scenario-tree", "png");
  if (key === "r" || key === "R") rebuildGraph();
}
</script>
</body>
</html>
